<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LifeFlow — Register as Donor</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red:#c0392b; --red-dark:#922b21; --red-light:#fadbd8; --dark:#1a1a2e; --card:#ffffff; --border:#e8e0e0; --text:#2c2c2c; --text-muted:#8a8a8a; }
    body { font-family:'DM Sans',sans-serif; background:var(--dark); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }

    .register-box {
      background:var(--card); border-radius:24px; padding:3rem;
      width:600px; max-width:95vw;
      box-shadow:0 40px 80px rgba(0,0,0,0.5);
      animation:slideUp 0.5s ease;
    }
    .reg-header { display:flex; align-items:center; gap:12px; margin-bottom:2rem; }
    .reg-header .logo { font-family:'Playfair Display',serif; font-size:22px; color:var(--red); display:flex; align-items:center; gap:8px; }
    .reg-header h2 { font-family:'Playfair Display',serif; font-size:26px; color:var(--dark); }
    .reg-header p { color:var(--text-muted); font-size:14px; }

    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .form-group { margin-bottom:1rem; display:flex; flex-direction:column; gap:6px; }
    .form-group label { font-size:13px; font-weight:500; color:var(--text-muted); }
    .form-group input, .form-group select {
      padding:11px 14px; border:1.5px solid var(--border); border-radius:10px;
      font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text); outline:none; transition:border 0.2s;
    }
    .form-group input:focus, .form-group select:focus { border-color:var(--red); }

    .check-group { display:flex; align-items:center; gap:10px; margin:0.5rem 0; }
    .check-group input { width:18px; height:18px; accent-color:var(--red); }
    .check-group label { font-size:14px; color:var(--text); }

    .btn-register { width:100%; padding:14px; background:var(--red); color:#fff; border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:500; cursor:pointer; transition:background 0.2s; margin-top:1rem; }
    .btn-register:hover { background:var(--red-dark); }

    .success-msg { background:#d5f5e3; color:#1e8449; padding:12px 16px; border-radius:10px; font-size:14px; margin-bottom:1rem; display:none; }
    .success-msg.show { display:block; }
    .error-msg { background:var(--red-light); color:var(--red-dark); padding:12px 16px; border-radius:10px; font-size:14px; margin-bottom:1rem; display:none; }
    .error-msg.show { display:block; }

    .login-link { text-align:center; margin-top:1.5rem; font-size:13px; color:var(--text-muted); }
    .login-link a { color:var(--red); text-decoration:none; font-weight:500; }

    .divider { border:none; border-top:1px solid var(--border); margin:1.5rem 0; }
  </style>
</head>
<body>
<div class="register-box">
  <div class="reg-header">
    <div>
      <div class="logo">♥ LifeFlow</div>
      <h2>Register as Donor</h2>
      <p>Join our community and help save lives</p>
    </div>
  </div>

  <div class="success-msg" id="successMsg">✅ Registration successful! You can now login with your email and phone number.</div>
  <div class="error-msg" id="errorMsg"></div>

  <form onsubmit="registerDonor(event)">
    <div class="form-row">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="rName" required placeholder="Your full name"/>
      </div>
      <div class="form-group">
        <label>Gender *</label>
        <select id="rGender">
          <option>Male</option><option>Female</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Age *</label>
        <input type="number" id="rAge" min="18" max="65" required placeholder="18-65"/>
      </div>
      <div class="form-group">
        <label>Blood Group *</label>
        <select id="rBloodGroup">
          <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
          <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone * (used as password)</label>
        <input type="text" id="rPhone" required placeholder="Your phone number"/>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="rEmail" required placeholder="Your email"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>City</label>
        <input type="text" id="rCity" placeholder="Your city"/>
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" id="rAddress" placeholder="Your address"/>
      </div>
    </div>
    <hr class="divider"/>
    <div class="check-group">
      <input type="checkbox" id="rAvailable" checked/>
      <label for="rAvailable">I am available to donate blood</label>
    </div>
    <p style="font-size:12px;color:var(--text-muted);margin-top:8px">
      ℹ️ Your phone number will be used as your login password. Keep it safe.
    </p>
    <button type="submit" class="btn-register">Register as Donor</button>
  </form>

  <div class="login-link">Already registered? <a href="login.html">Login here</a></div>
</div>

<script>
  const API = 'http://localhost:8080/api';

  async function registerDonor(e) {
    e.preventDefault();
    const donor = {
      fullName: document.getElementById('rName').value,
      gender: document.getElementById('rGender').value,
      age: +document.getElementById('rAge').value,
      bloodGroup: document.getElementById('rBloodGroup').value,
      phone: document.getElementById('rPhone').value,
      email: document.getElementById('rEmail').value,
      city: document.getElementById('rCity').value,
      address: document.getElementById('rAddress').value,
      availableToDonate: document.getElementById('rAvailable').checked
    };

    try {
      const res = await fetch(`${API}/donors`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(donor)
      });
      if (res.ok) {
        document.getElementById('successMsg').classList.add('show');
        document.getElementById('errorMsg').classList.remove('show');
        e.target.reset();
        setTimeout(() => window.location.href = 'login.html', 2500);
      } else {
        throw new Error('Registration failed');
      }
    } catch(err) {
      document.getElementById('errorMsg').textContent = 'Registration failed. Please try again.';
      document.getElementById('errorMsg').classList.add('show');
    }
  }
</script>
</body>
</html>
